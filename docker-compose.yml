services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 20s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./Server
    restart: unless-stopped
    env_file:
      - ./Server/.env
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/sas-academy
      CLIENT_URLS: http://localhost:8080,http://localhost:3000,http://localhost:3002
    ports:
      - "5000:5000"
    volumes:
      - server-uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  mongo-data:
  server-uploads:
