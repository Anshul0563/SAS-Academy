services:
  server:
    build:
      context: ./Server
    restart: unless-stopped
    env_file:
      - ./Server/.env
    environment:
      PORT: 5000
      CLIENT_URLS: ${CLIENT_URLS:-https://sasacademy.in}
    volumes:
      - server-uploads:/app/uploads
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./client
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  server-uploads:
